version: '3.8'

services:
  # ==========================================
  # 🔒 Caddy - Reverse Proxy & HTTPS
  # ==========================================
  caddy:
    image: caddy:2-alpine
    container_name: gateway-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    networks:
      - gateway-network
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # 🗄️ PostgreSQL - Source of Truth
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: gateway-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network
    secrets:
      - postgres_password

  # ==========================================
  # 📦 Redis - Cache & Rate Limiting
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network
    secrets:
      - redis_password

  # ==========================================
  # 🐰 RabbitMQ - Message Queue
  # ==========================================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gateway-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-gateway}
      RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gateway-network
    secrets:
      - rabbitmq_password

  # ==========================================
  # 🌐 API Gateway
  # ==========================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: gateway-api
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - PAYMENT_SERVICE_URL=http://payment-service:3001
      - API_KEY_FILE=/run/secrets/api_key
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
      caddy:
        condition: service_healthy
    networks:
      - gateway-network
    secrets:
      - api_key

  # ==========================================
  # 💰 Payment Service
  # ==========================================
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: gateway-payment
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - DATABASE_URL=postgresql://gateway:${POSTGRES_PASSWORD}@postgres:5432/gateway
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - RABBITMQ_URL=amqp://gateway:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - MP_ACCESS_TOKEN_FILE=/run/secrets/mp_access_token
      - MP_WEBHOOK_SECRET_FILE=/run/secrets/mp_webhook_secret
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway-network
    secrets:
      - mp_access_token
      - mp_webhook_secret

  # ==========================================
  # 🔔 Notification Service
  # ==========================================
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: gateway-notification
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3002
      - WEBSOCKET_PORT=3003
      - RABBITMQ_URL=amqp://gateway:${RABBITMQ_PASSWORD}@rabbitmq:5672
    ports:
      - "3002:3002"
      - "3003:3003"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway-network

  # ==========================================
  # ✉️ Email Service
  # ==========================================
  email-service:
    build:
      context: ./email-service
      dockerfile: Dockerfile
    container_name: gateway-email
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3004
      - RABBITMQ_URL=amqp://gateway:${RABBITMQ_PASSWORD}@rabbitmq:5672
      - SMTP_USER_FILE=/run/secrets/smtp_user
      - SMTP_PASS_FILE=/run/secrets/smtp_pass
    ports:
      - "3004:3004"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway-network

  # ==========================================
  # 💾 Database Backup
  # ==========================================
  backup:
    image: postgres:15-alpine
    container_name: gateway-backup
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=gateway
      - POSTGRES_USER=gateway
      - SCHEDULE=0 2 * * *  # 2h da manhã
      - DAYS_TO_KEEP=7
    volumes:
      - ./infra/backup/backup.sh:/app/backup.sh:ro
      - ./infra/backup/restore.sh:/app/restore.sh:ro
      - backup_data:/app/backups
    secrets:
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gateway-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  backup_data:

networks:
  gateway-network:
    driver: bridge

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  rabbitmq_password:
    file: ./secrets/rabbitmq_password.txt
  api_key:
    file: ./secrets/api_key.txt
  mp_access_token:
    file: ./secrets/mp_access_token.txt
  mp_webhook_secret:
    file: ./secrets/mp_webhook_secret.txt
  smtp_user:
    file: ./secrets/smtp_user.txt
  smtp_pass:
    file: ./secrets/smtp_pass.txt


